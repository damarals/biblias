name: stats

# Daily snapshot of GitHub Release download counts per version, plus a cumulative
# chart. GitHub exposes only the current total per asset (no history), so the time
# series is built forward from each run. Also runnable on demand.
on:
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv + Python
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Snapshot download counts and render chart
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: uv run --no-project --with matplotlib python scripts/update_stats.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/stats/downloads.csv data/stats/downloads.svg
          git diff --cached --quiet || git commit -m "chore(stats): daily download snapshot"
          git push
